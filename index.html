<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8" />
	<!-- Otimizado para tablets em modo paisagem; impede zoom acidental por gesto -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<meta name="theme-color" content="#8B5E34" />
	<meta name="description" content="Histórias do Mundo — acontecimentos históricos famosos em letras grandes, feito para idosos." />
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<title>Histórias do Mundo</title>
	<link rel="apple-touch-icon" href="icons/icon-192.png" />
	<style>
/* ==========================================================================
   Histórias do Mundo — estilos
   Foco: idosos, tablet em paisagem, letras grandes, alto contraste.
   ========================================================================== */

/* Variáveis de tema. --escala controla o tamanho geral da letra. */
:root {
	--escala: 1;                 /* ajustada pelos botões A- / A+ */
	--fonte-base: 26px;          /* base > 24px exigido */
	--raio: 22px;
	--espaco: clamp(20px, 3vw, 40px);

	/* Modo claro (padrão) */
	--fundo: #F4ECDD;
	--fundo-barra: #8B5E34;
	--fundo-cartao: #FFFDF8;
	--texto: #241C12;
	--texto-suave: #5A4A36;
	--titulo: #6B3F14;
	--periodo-fundo: #E7D4B5;
	--periodo-texto: #5A3A12;
	--sombra: 0 10px 30px rgba(60, 40, 15, 0.18);
	--btn-fundo: #FFFFFF;
	--btn-texto: #3A2A16;
	--btn-borda: rgba(255, 255, 255, 0.6);
	--barra-texto: #FFF8EC;
	--realce: #B87333;
}

/* Modo escuro */
html[data-tema="escuro"] {
	--fundo: #12100D;
	--fundo-barra: #1E1A14;
	--fundo-cartao: #201B15;
	--texto: #F6EFE2;
	--texto-suave: #C9BCA6;
	--titulo: #F0C489;
	--periodo-fundo: #3A2F20;
	--periodo-texto: #F0D6A8;
	--sombra: 0 10px 30px rgba(0, 0, 0, 0.55);
	--btn-fundo: #2E271E;
	--btn-texto: #F6EFE2;
	--btn-borda: rgba(255, 255, 255, 0.12);
	--barra-texto: #F6EFE2;
	--realce: #E0A85C;
}

* { box-sizing: border-box; }

html, body {
	margin: 0;
	padding: 0;
	background: var(--fundo);
	color: var(--texto);
	font-family: "Segoe UI", "Noto Sans", system-ui, -apple-system, Arial, sans-serif;
	-webkit-text-size-adjust: none;
	scroll-behavior: smooth;
	overscroll-behavior-y: contain;
}

body {
	font-size: calc(var(--fonte-base) * var(--escala));
	line-height: 1.65;
	padding-top: 92px; /* espaço para a barra fixa */
}

/* ------------------------- Barra superior ------------------------- */
.barra {
	position: fixed;
	top: 0; left: 0; right: 0;
	height: 92px;
	z-index: 50;
	background: var(--fundo-barra);
	color: var(--barra-texto);
	display: flex;
	align-items: center;
	justify-content: space-between;
	padding: 0 clamp(16px, 3vw, 40px);
	gap: 16px;
	box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
}

.barra-titulo {
	display: flex;
	align-items: center;
	gap: 14px;
	font-size: clamp(24px, 3.2vw, 34px);
	font-weight: 800;
	letter-spacing: 0.3px;
	white-space: nowrap;
}
.barra-emoji { font-size: 1.3em; }

.barra-controles {
	display: flex;
	align-items: center;
	gap: clamp(10px, 1.6vw, 18px);
}

/* Botões grandes e fáceis de tocar (mínimo ~64px) */
.btn {
	min-width: 68px;
	height: 68px;
	padding: 0 16px;
	border-radius: 18px;
	border: 2px solid var(--btn-borda);
	background: var(--btn-fundo);
	color: var(--btn-texto);
	font-size: 30px;
	font-weight: 700;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
	transition: transform 0.08s ease, filter 0.15s ease;
	-webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.94); filter: brightness(0.95); }
.btn-icone { display: flex; align-items: baseline; gap: 2px; line-height: 1; }
.btn-icone small { font-size: 0.62em; font-weight: 800; }

/* ------------------------- Feed / cartões ------------------------- */
.feed {
	display: flex;
	flex-direction: column;
	gap: var(--espaco);
	padding: var(--espaco);
	max-width: 1600px;
	margin: 0 auto;
}

.cartao {
	background: var(--fundo-cartao);
	border-radius: var(--raio);
	box-shadow: var(--sombra);
	overflow: hidden;
	display: grid;
	grid-template-columns: 45% 55%; /* imagem 45% — texto 55% */
	min-height: 60vh;
	animation: aparecer 0.5s ease both;
}

@keyframes aparecer {
	from { opacity: 0; transform: translateY(24px); }
	to   { opacity: 1; transform: translateY(0); }
}

.cartao-imagem {
	width: 100%;
	height: 100%;
	min-height: 320px;
	object-fit: cover;
	display: block;
	background: #cdbfa6;
}

.cartao-conteudo {
	padding: clamp(24px, 3vw, 48px);
	display: flex;
	flex-direction: column;
	gap: clamp(14px, 1.6vw, 22px);
	justify-content: center;
}

.cartao-periodo {
	align-self: flex-start;
	background: var(--periodo-fundo);
	color: var(--periodo-texto);
	font-weight: 800;
	font-size: 0.72em;
	padding: 8px 18px;
	border-radius: 999px;
	letter-spacing: 0.4px;
}

.cartao-titulo {
	margin: 0;
	color: var(--titulo);
	font-size: clamp(30px, 4vw, 50px);
	line-height: 1.15;
	font-weight: 800;
}

.cartao-texto {
	margin: 0;
	color: var(--texto);
	font-size: 1em; /* herda a base (>=26px) */
}

.cartao-curiosidade {
	margin-top: 6px;
	background: rgba(184, 115, 51, 0.12);
	border-left: 8px solid var(--realce);
	border-radius: 12px;
	padding: 16px 20px;
	color: var(--texto-suave);
	font-size: 0.92em;
}
.cartao-curiosidade b { color: var(--titulo); }

/* Numeração discreta do cartão (ajuda a saber a posição) */
.cartao-numero {
	font-size: 0.62em;
	color: var(--texto-suave);
	opacity: 0.7;
	font-weight: 700;
}

/* ------------------------- Sentinela / carregando ------------------------- */
.sentinela {
	display: flex;
	justify-content: center;
	padding: 30px 0 60px;
}
.carregando {
	font-size: 0.8em;
	color: var(--texto-suave);
	font-weight: 700;
}

/* ------------------------- Botão voltar ao topo ------------------------- */
.voltar-topo {
	position: fixed;
	right: clamp(16px, 3vw, 40px);
	bottom: clamp(16px, 3vw, 40px);
	z-index: 40;
	padding: 18px 28px;
	font-size: 24px;
	font-weight: 800;
	color: #fff;
	background: var(--realce);
	border: none;
	border-radius: 999px;
	box-shadow: 0 8px 22px rgba(0, 0, 0, 0.3);
	cursor: pointer;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.25s ease, transform 0.08s ease;
}
.voltar-topo.visivel { opacity: 1; pointer-events: auto; }
.voltar-topo:active { transform: scale(0.94); }

/* ------------------------- Modo quiosque ------------------------- */
html[data-quiosque="1"] .barra { display: none; }
html[data-quiosque="1"] body { padding-top: var(--espaco); }
html[data-quiosque="1"] .voltar-topo { display: none; }

.sair-quiosque {
	display: none;
	position: fixed;
	top: 10px; left: 50%;
	transform: translateX(-50%);
	z-index: 60;
	padding: 12px 22px;
	font-size: 20px;
	font-weight: 700;
	border-radius: 999px;
	border: none;
	background: rgba(0,0,0,0.75);
	color: #fff;
	cursor: pointer;
}
html[data-quiosque="1"] .sair-quiosque.mostrar { display: block; }

/* ------------------------- Retrato: orientação ------------------------- */
/* O app é pensado para paisagem. Em retrato, sugerimos girar o tablet. */
.aviso-girar {
	display: none;
	position: fixed;
	inset: 0;
	z-index: 100;
	background: var(--fundo);
	color: var(--texto);
	flex-direction: column;
	align-items: center;
	justify-content: center;
	text-align: center;
	padding: 40px;
	gap: 20px;
}
.aviso-girar .icone-girar { font-size: 90px; animation: girar 2.2s ease-in-out infinite; }
.aviso-girar p { font-size: 32px; font-weight: 800; max-width: 700px; }
@keyframes girar { 0%,100%{transform:rotate(0)} 50%{transform:rotate(90deg)} }

/* Mostra o aviso apenas em telas pequenas em retrato (celulares/tablets). */
@media (orientation: portrait) and (max-width: 1100px) {
	.aviso-girar { display: flex; }
}

/* Em telas estreitas (fallback), empilha imagem e texto para não quebrar. */
@media (max-width: 720px) {
	.cartao { grid-template-columns: 1fr; min-height: unset; }
	.cartao-imagem { min-height: 220px; max-height: 40vh; }
}

/* Respeita quem prefere menos animação */
@media (prefers-reduced-motion: reduce) {
	.cartao { animation: none; }
	html, body { scroll-behavior: auto; }
	.aviso-girar .icone-girar { animation: none; }
}

	</style>
</head>
<body>
	<!-- Barra superior fixa com controles grandes e simples -->
	<header class="barra" id="barra">
		<div class="barra-titulo">
			<span class="barra-emoji" aria-hidden="true">🌍</span>
			<span>Histórias do Mundo</span>
		</div>

		<div class="barra-controles">
			<!-- Tamanho da letra -->
			<button class="btn" id="btnMenosFonte" aria-label="Diminuir letra" title="Diminuir letra">
				<span class="btn-icone">A<small>−</small></span>
			</button>
			<button class="btn" id="btnMaisFonte" aria-label="Aumentar letra" title="Aumentar letra">
				<span class="btn-icone">A<small>+</small></span>
			</button>

			<!-- Modo claro/escuro -->
			<button class="btn" id="btnTema" aria-label="Alternar modo claro e escuro" title="Modo claro/escuro">
				<span class="btn-icone" id="iconeTema">🌙</span>
			</button>

			<!-- Tela cheia -->
			<button class="btn" id="btnTelaCheia" aria-label="Tela cheia" title="Tela cheia">
				<span class="btn-icone">⛶</span>
			</button>

			<!-- Modo quiosque -->
			<button class="btn" id="btnQuiosque" aria-label="Modo quiosque" title="Modo quiosque">
				<span class="btn-icone">🔒</span>
			</button>
		</div>
	</header>

	<!-- Feed principal: os cartões são inseridos aqui pelo JavaScript -->
	<main class="feed" id="feed" aria-live="polite"></main>

	<!-- Sentinela usada para carregamento progressivo (rolagem infinita) -->
	<div id="sentinela" class="sentinela" aria-hidden="true">
		<div class="carregando">Carregando mais histórias…</div>
	</div>

	<!-- Botão grande para voltar ao topo -->
	<button class="voltar-topo" id="voltarTopo" aria-label="Voltar ao início" title="Voltar ao início">↑ Início</button>

	<!-- Aviso discreto para sair do modo quiosque -->
	<button class="sair-quiosque" id="sairQuiosque" aria-label="Sair do modo quiosque">Sair do modo quiosque</button>
	<script>
/* ==========================================================================
   Histórias do Mundo — base de conteúdo
   Cada item tem:
     t   = título chamativo
     p   = ano ou período histórico
     c   = categoria
     e   = emoji usado na ilustração
     cor = duas cores para o degradê da ilustração
     txt = texto principal (linguagem simples, 100–250 palavras)
     cur = curiosidade interessante
   As ilustrações são geradas dentro do próprio app (SVG), por isso o
   aplicativo funciona totalmente offline, sem baixar imagens da internet.
   ========================================================================== */
window.HISTORIAS = [
{ t: "As Pirâmides do Egito", p: "Cerca de 2560 a.C.", c: "Antiguidade", e: "🔺", cor: ["#E8B96A","#B9762E"],
  txt: "As grandes pirâmides foram construídas no Egito há mais de quatro mil e quinhentos anos. A maior delas, a Pirâmide de Quéops, servia como túmulo do faraó, o rei do Egito. Milhares de trabalhadores empilharam blocos de pedra enormes, alguns pesando mais que um automóvel. Tudo foi feito sem máquinas modernas, apenas com força humana, cordas, rampas e muita organização. Os egípcios acreditavam na vida após a morte, por isso guardavam objetos, comida e tesouros junto do corpo do faraó. As pirâmides mostram como aquele povo era inteligente na matemática e na engenharia.",
  cur: "A Pirâmide de Quéops foi a construção mais alta do mundo por quase quatro mil anos." },

{ t: "Alexandre, o Grande", p: "356–323 a.C.", c: "Personalidades", e: "⚔️", cor: ["#C9A24B","#7A5A1E"],
  txt: "Alexandre nasceu na Macedônia, uma região da Grécia antiga, e tornou-se um dos maiores conquistadores da história. Ainda muito jovem, assumiu o trono e comandou seu exército por terras distantes. Conquistou o Egito, a Pérsia e chegou até as portas da Índia. Por onde passava, espalhava a língua e a cultura gregas, unindo povos muito diferentes. Fundou várias cidades, e a mais famosa recebeu seu nome: Alexandria, no Egito. Apesar de todo o poder, morreu jovem, com apenas trinta e dois anos. Seu império foi um dos maiores que o mundo antigo já conheceu.",
  cur: "Seu cavalo preferido, Bucéfalo, foi tão querido que ganhou uma cidade com seu nome." },

{ t: "O Império Romano", p: "27 a.C. – 476 d.C.", c: "Impérios", e: "🏛️", cor: ["#C08A5B","#6E3F22"],
  txt: "O Império Romano foi um dos maiores e mais poderosos da história. Começou na cidade de Roma, na Itália, e cresceu até dominar terras na Europa, na África e na Ásia. Os romanos eram excelentes construtores: fizeram estradas, pontes e aquedutos que levavam água para as cidades. Muitas dessas obras existem até hoje. Eles também criaram leis que servem de base para as leis de muitos países atuais. O latím, língua dos romanos, deu origem ao português, ao espanhol, ao italiano e ao francês. Depois de séculos de glória, o império enfraqueceu e acabou sendo dividido.",
  cur: "Muitas palavras que usamos hoje vêm do latím falado pelos romanos." },

{ t: "O Coliseu de Roma", p: "Inaugurado em 80 d.C.", c: "Antiguidade", e: "🏟️", cor: ["#D2A679","#7C4A2A"],
  txt: "O Coliseu é um gigantesco anfiteatro construído em Roma há quase dois mil anos. Nele cabiam mais de cinquenta mil pessoas, que assistiam a espetáculos, lutas de gladiadores e apresentações com animais. Era como um grande estádio dos dias de hoje, só que muito mais antigo. Foi construído com pedra e um material parecido com o cimento moderno. Tinha corredores, escadas e saídas muito bem organizadas, para que o público entrasse e saísse com rapidez. Com o passar dos séculos, terremotos e o tempo destruíram parte da construção, mas ela continua imponente e recebe milhões de visitantes todos os anos.",
  cur: "O Coliseu tinha um sistema de toldos para proteger o público do sol forte." },

{ t: "A Muralha da China", p: "Construída ao longo de séculos", c: "Impérios", e: "🯱", cor: ["#A8B18C","#5C6B3E"],
  txt: "A Muralha da China é uma das maiores construções feitas pela humanidade. Ela se estende por milhares de quilômetros por montanhas e vales da China. Foi construída aos poucos, durante muitos séculos, para proteger o país de invasões de povos vizinhos. Soldados vigiavam do alto das torres e avisavam quando o perigo se aproximava, usando fumaça durante o dia e fogo à noite. Milhares de trabalhadores participaram da obra, empilhando pedra, terra e tijolos. Hoje a muralha é um símbolo da China e um dos lugares mais visitados do mundo.",
  cur: "Não é verdade que ela pode ser vista da Lua a olho nu, apesar da lenda popular." },

{ t: "A Democracia de Atenas", p: "Cerca de 500 a.C.", c: "Antiguidade", e: "🏰", cor: ["#9DB4C0","#4A6572"],
  txt: "Na cidade de Atenas, na Grécia antiga, nasceu uma das primeiras formas de democracia do mundo. A palavra democracia significa governo do povo. Ali os cidadãos se reuniam em praças para discutir e votar as decisões importantes da cidade. Cada um podia dar sua opinião e levantar a mão para escolher o que achava melhor. Era diferente dos reis, que decidiam tudo sozinhos. Essa ideia influenciou o mundo inteiro e ainda hoje muitos países escolhem seus governantes pelo voto. É verdade que naquela época nem todos podiam votar, mas foi um começo muito importante para a história da liberdade.",
  cur: "Em Atenas, as decisões eram tomadas ao ar livre, numa colina chamada Pnyx." },

{ t: "Os Jogos Olímpicos Antigos", p: "A partir de 776 a.C.", c: "Antiguidade", e: "🏅", cor: ["#D9C27A","#8A6B25"],
  txt: "Os primeiros Jogos Olímpicos aconteceram na Grécia antiga, na cidade de Olímpia, há mais de dois mil e setecentos anos. Atletas de várias regiões se reuniam para competir em provas de corrida, luta, salto e lançamento. Durante os jogos, até as guerras eram interrompidas, para que todos pudessem participar em paz. Os vencedores não ganhavam dinheiro, mas uma coroa feita de folhas de oliveira, considerada uma grande honra. Os gregos acreditavam que os jogos homenageavam seus deuses. Muitos séculos depois, essa tradição foi reiniciada e deu origem aos Jogos Olímpicos modernos que conhecemos hoje.",
  cur: "Os jogos antigos aconteciam a cada quatro anos, assim como acontece até hoje." },

{ t: "Os Castelos Medievais", p: "Idade Média", c: "Idade Média", e: "🏰", cor: ["#A9A29B","#5A5450"],
  txt: "Durante a Idade Média, na Europa, foram construídos muitos castelos de pedra. Eles serviam como moradia dos senhores e também como fortalezas para proteger as pessoas durante ataques. Os castelos tinham muralhas altas, torres de vigia e, muitas vezes, um fosso com água ao redor para dificultar a entrada dos inimigos. Dentro deles viviam nobres, soldados e criados. Quando havia perigo, os moradores das aldeias vizinhas se abrigavam ali. A vida girava em torno da agricultura, e os camponeses trabalhavam nas terras do senhor. Muitos desses castelos ainda existem e nos ajudam a imaginar como era a vida naquele tempo.",
  cur: "A ponte levadiça podia ser erguida rapidamente para impedir a entrada de invasores." },

{ t: "As Viagens de Marco Polo", p: "Século XIII", c: "Grandes descobertas", e: "🧭", cor: ["#C89B6A","#6E4A24"],
  txt: "Marco Polo foi um viajante italiano que, ainda jovem, partiu de Veneza rumo à distante China. A viagem durou anos, atravessando desertos, montanhas e cidades desconhecidas. Ele viveu muito tempo na corte do imperador mongol Kublai Khan e conheceu costumes, comidas e invenções que os europeus nunca tinham visto. Ao voltar, contou tudo em um livro que encantou a Europa. Muitas pessoas nem acreditavam em suas histórias, de tão incríveis que pareciam. Seus relatos despertaram a curiosidade sobre terras distantes e inspiraram outros exploradores a buscarem novos caminhos pelo mundo.",
  cur: "Dizem que Marco Polo ajudou a espalhar na Europa a curiosidade pelas especiarias do Oriente." },

{ t: "Leonardo da Vinci", p: "1452–1519", c: "Renascimento", e: "🎨", cor: ["#B79B6E","#6B5230"],
  txt: "Leonardo da Vinci foi um dos homens mais geniais de todos os tempos. Nasceu na Itália, durante o Renascimento, uma época de grande florescimento das artes e das ciências. Ele era pintor, inventor, cientista e estudioso do corpo humano. Pintou quadros famosos, como a Mona Lisa e a Santa Ceia, admirados até hoje. Além disso, enchia cadernos com desenhos de máquinas voadoras, pontes e engenhocas muito à frente de seu tempo. Curioso por natureza, observava tudo com atenção: pássaros, água, plantas e o próprio ser humano. Leonardo mostrou que arte e ciência podem caminhar juntas.",
  cur: "Ele costumava escrever de trás para frente, e seus textos só podem ser lidos no espelho." },

{ t: "A Imprensa de Gutenberg", p: "Cerca de 1450", c: "Grandes invenções", e: "📚", cor: ["#B0A184","#5E5238"],
  txt: "Antes de 1450, os livros eram copiados à mão, um por um, o que levava muito tempo e custava caro. Poucas pessoas podiam ter um livro. Então, na Alemanha, Johannes Gutenberg criou uma máquina de imprimir com tipos móveis, pequenas peças com letras que podiam ser reorganizadas. Com ela, foi possível imprimir muitos livros de forma rápida. O conhecimento passou a se espalhar como nunca antes. Mais pessoas aprenderam a ler, e novas ideias circularam pela Europa. Essa invenção mudou o mundo e é considerada uma das mais importantes da história da humanidade.",
  cur: "O primeiro grande livro impresso por Gutenberg foi uma Bíblia." },

{ t: "Cristovão Colombo chega à América", p: "1492", c: "Grandes descobertas", e: "⚓", cor: ["#7FA6B0","#3C5A62"],
  txt: "Em 1492, o navegador Cristovão Colombo partiu da Espanha com três embarcações em busca de um novo caminho para as Índias, na Ásia. Ele queria chegar lá navegando para o oeste, atravessando o oceano. Depois de semanas no mar, avistou terra. Mas não eram as Índias: ele havia chegado a ilhas do continente americano, até então desconhecido pelos europeus. Essa viagem marcou o encontro entre dois mundos que não se conheciam. A partir daí, europeus passaram a cruzar o oceano com frequência, iniciando um período de grandes mudanças na história da América e do mundo.",
  cur: "Colombo morreu acreditando que havia chegado à Ásia, e não a um novo continente." },

{ t: "O Descobrimento do Brasil", p: "1500", c: "História do Brasil", e: "🚢", cor: ["#6FB08A","#2F6B4A"],
  txt: "No ano de 1500, uma frota de navios portugueses comandada por Pedro Álvares Cabral chegou à costa do que hoje é o Brasil. Os portugueses buscavam um caminho para as Índias, mas acabaram encontrando essas terras, onde já viviam muitos povos indígenas há milhares de anos. O encontro entre portugueses e indígenas marcou o início de uma nova fase na história da região. Com o tempo, Portugal começou a colonizar o território, trazendo pessoas, costumes e a língua portuguesa. Assim começou a longa história do Brasil, formada pela mistura de muitos povos e culturas.",
  cur: "A primeira missa no Brasil foi celebrada poucos dias após a chegada dos portugueses." },

{ t: "Fernão de Magalhães dá a volta ao mundo", p: "1519–1522", c: "Grandes descobertas", e: "🌐", cor: ["#6FA0B8","#33586E"],
  txt: "No início do século XVI, o navegador Fernão de Magalhães liderou a primeira viagem que deu a volta completa ao mundo pelo mar. A expedição partiu com vários navios e centenas de homens, enfrentando tempestades, fome e mares nunca antes navegados. Magalhães descobriu uma passagem no sul da América que liga dois oceanos e hoje leva seu nome. Ele não conseguiu terminar a viagem, pois morreu no caminho, mas parte de sua tripulação continuou e voltou à Europa anos depois. Aquela viagem provou, na prática, que a Terra é redonda e muito maior do que se imaginava.",
  cur: "De cinco navios que partiram, apenas um conseguiu completar a volta ao mundo." },

{ t: "A Revolução Francesa", p: "1789", c: "Guerras importantes", e: "🕊️", cor: ["#B85C5C","#6E2E2E"],
  txt: "No fim do século XVIII, o povo da França vivia com muita pobreza, enquanto o rei e os nobres desfrutavam de luxo. Cansados da fome e da injustiça, os franceses se revoltaram. Em 1789, a população tomou uma prisão chamada Bastilha, marcando o início da Revolução Francesa. O povo lutava por três ideais: liberdade, igualdade e fraternidade. A revolução derrubou o poder absoluto do rei e mudou para sempre a forma de pensar sobre direitos e cidadania. As ideias nascidas ali se espalharam pelo mundo e influenciaram muitas nações, inclusive na luta por liberdade em outros continentes.",
  cur: "O lema liberdade, igualdade e fraternidade ainda é o lema oficial da França." },

{ t: "A Revolução Industrial", p: "Séculos XVIII e XIX", c: "Ciência e tecnologia", e: "⚙️", cor: ["#8C8C8C","#4A4A4A"],
  txt: "A Revolução Industrial começou na Inglaterra e mudou completamente a forma como as coisas eram produzidas. Antes, quase tudo era feito à mão, em pequenas oficinas. Com a invenção das máquinas a vapor, surgiram grandes fábricas capazes de produzir tecidos, ferramentas e produtos em grande quantidade. Muitas pessoas deixaram o campo e foram morar nas cidades para trabalhar nas indústrias. Surgiram trens e navios a vapor, que encurtaram distâncias. A vida ficou mais rápida, mas o trabalho nas fábricas era duro e as jornadas, longas. Essa transformação deu origem ao mundo moderno em que vivemos.",
  cur: "A máquina a vapor foi aperfeiçoada por James Watt, cujo nome batiza a unidade de potência." },

{ t: "A Independência do Brasil", p: "1822", c: "História do Brasil", e: "🇧🇷", cor: ["#63A36B","#2E6B3A"],
  txt: "Durante mais de trezentos anos, o Brasil foi uma colônia de Portugal, ou seja, era governado de longe pelo rei português. Com o tempo, os brasileiros passaram a desejar governar o próprio país. Em 7 de setembro de 1822, às margens do rio Ipiranga, em São Paulo, o príncipe Dom Pedro declarou a independência do Brasil. Esse momento ficou conhecido como o Grito do Ipiranga. A partir dali, o Brasil deixou de ser colônia e passou a ser um país independente, com governo próprio. Dom Pedro tornou-se o primeiro imperador, e a data é comemorada até hoje.",
  cur: "A frase atribuída a Dom Pedro naquele dia é: Independência ou morte!" },

{ t: "A Abolição da Escravidão no Brasil", p: "1888", c: "História do Brasil", e: "⛓️", cor: ["#B79256","#6B4E22"],
  txt: "Por muito tempo, o Brasil usou o trabalho de milhões de pessoas escravizadas, trazidas à força da África. Elas trabalhavam sem liberdade e sem direitos, em condições muito duras. Aos poucos, cresceu no país um movimento que lutava pelo fim da escravidão. Em 13 de maio de 1888, foi assinada a Lei Áurea, pela Princesa Isabel, que declarou livres todas as pessoas escravizadas no Brasil. Foi um passo importantíssimo, embora os libertos tenham enfrentado muitas dificuldades depois, sem apoio para recomeçar a vida. A data marca a luta pela liberdade e pela igualdade entre as pessoas.",
  cur: "O Brasil foi o último país das Américas a abolir oficialmente a escravidão." },

{ t: "Santos Dumont e o voo do 14-Bis", p: "1906", c: "Ciência e tecnologia", e: "✈️", cor: ["#7FA6C4","#3A5B74"],
  txt: "Alberto Santos Dumont foi um inventor brasileiro apaixonado por voar. Em 1906, na cidade de Paris, ele fez decolar diante de uma multidão um avião chamado 14-Bis. Foi o primeiro voo público de um aparelho mais pesado que o ar, que decolou por seus próprios meios, sem ajuda de trilhos ou catapultas. Muitos consideram esse feito o nascimento da aviação. Santos Dumont também criou balões dirigíveis e um pequeno avião chamado Demoiselle. Ele acreditava que o avião serviria para unir as pessoas. No Brasil, é celebrado como o Pai da Aviação.",
  cur: "Ele também ajudou a popularizar o relógio de pulso, para consultar as horas enquanto voava." },

{ t: "Albert Einstein e a Relatividade", p: "1905 em diante", c: "Ciência e tecnologia", e: "🧠", cor: ["#8E9BB3","#454F63"],
  txt: "Albert Einstein foi um dos cientistas mais importantes de todos os tempos. Nascido na Alemanha, ele estudou o tempo, o espaço, a luz e a gravidade de um jeito totalmente novo. Sua famosa teoria da relatividade mudou a forma como entendemos o universo. Einstein mostrou que o tempo pode passar de maneira diferente dependendo da velocidade e da gravidade, algo que parece impossível, mas foi comprovado. Suas ideias ajudaram no desenvolvimento de tecnologias modernas. Apesar de gênio, era conhecido por seu jeito simples e bem-humorado. Recebeu o Prêmio Nobel e virou símbolo mundial de inteligência.",
  cur: "Sua equação mais famosa, E igual a m c ao quadrado, cabe em uma única linha." },

{ t: "O Naufrágio do Titanic", p: "1912", c: "Ciência e tecnologia", e: "🚢", cor: ["#5F7C8A","#2C424C"],
  txt: "O Titanic foi um navio enorme e luxuoso, considerado o mais moderno de sua época. Muitos diziam que ele era impossível de afundar. Em sua primeira viagem, cruzando o oceano Atlântico rumo aos Estados Unidos, o navio chocou-se com um iceberg durante a noite. A colisão abriu rombos no casco, e a água começou a entrar. Infelizmente, não havia botes salva-vidas suficientes para todos, e muitas pessoas perderam a vida naquela noite fria. O naufrágio do Titanic chocou o mundo e levou a novas regras de segurança no mar, que protegem os passageiros até hoje.",
  cur: "Após a tragédia, passou a ser obrigatório ter botes salva-vidas para todos a bordo." },

{ t: "A Primeira Guerra Mundial", p: "1914–1918", c: "Guerras importantes", e: "🎖️", cor: ["#8A8064","#4A432E"],
  txt: "A Primeira Guerra Mundial foi um dos maiores conflitos que o mundo já viu. Começou na Europa e envolveu muitos países, divididos em dois grandes grupos. Foi chamada de guerra mundial porque atingiu nações de vários continentes. Os soldados lutavam em longas trincheiras cavadas no chão, enfrentando frio, lama e doenças. Foi também a primeira vez que se usaram, em grande escala, aviões, tanques e outras armas modernas. Milhões de pessoas perderam a vida. Ao final, o mapa da Europa mudou e ficou a esperança de que nunca mais houvesse uma guerra tão terrível, embora outra viesse anos depois.",
  cur: "Ficou conhecida na época como a Grande Guerra, antes que houvesse uma segunda." },

{ t: "A Segunda Guerra Mundial", p: "1939–1945", c: "Guerras importantes", e: "🕊️", cor: ["#77808A","#3A424C"],
  txt: "A Segunda Guerra Mundial foi o maior conflito da história da humanidade. Começou quando a Alemanha, governada por um regime autoritário, invadiu países vizinhos. Logo, nações de todo o mundo se envolveram, divididas em dois lados. A guerra durou seis anos e atingiu a Europa, a Ásia, a África e os oceanos. Milhões de pessoas morreram, incluindo civis. Foi um período de grande sofrimento, marcado também por injustiças terríveis contra populações inteiras. A guerra terminou em 1945, e o mundo se uniu para tentar construir a paz, criando organizações internacionais para evitar novos conflitos.",
  cur: "Após a guerra foi criada a Organização das Nações Unidas, a ONU, para defender a paz." },

{ t: "A Descoberta da Penicilina", p: "1928", c: "Ciência e tecnologia", e: "💊", cor: ["#7FB08A","#356B48"],
  txt: "Em 1928, o cientista Alexander Fleming fez uma descoberta que salvaria milhões de vidas. Por acaso, ele percebeu que um tipo de mofo que havia crescido em um de seus experimentos matava bactérias perigosas. Desse mofo veio a penicilina, o primeiro antibiótico. Antes disso, muitas pessoas morriam de infecções simples, que hoje são facilmente tratadas. Com o tempo, a penicilina passou a ser produzida em grande quantidade e usada em hospitais no mundo inteiro. Essa descoberta abriu caminho para outros remédios e transformou a medicina. É um dos maiores exemplos de como a ciência pode melhorar a vida das pessoas.",
  cur: "A descoberta aconteceu quase por acaso, ao observar um pote esquecido no laboratório." },

{ t: "A Chegada do Homem à Lua", p: "1969", c: "Exploração espacial", e: "🌕", cor: ["#7C8AA0","#333B4A"],
  txt: "Em 1969, a humanidade realizou um sonho antigo: pisar na Lua. Uma nave dos Estados Unidos, a Apollo 11, levou três astronautas em uma longa viagem pelo espaço. Dois deles desceram até a superfície lunar, enquanto o terceiro os aguardava na nave. Neil Armstrong foi o primeiro ser humano a pisar na Lua e disse uma frase que ficou famosa no mundo todo. Milhões de pessoas acompanharam o momento pela televisão. Os astronautas caminharam, coletaram pedras e deixaram uma bandeira. Foi uma conquista impressionante, que mostrou até onde a ciência e a coragem humana podem chegar.",
  cur: "As pegadas dos astronautas ainda estão na Lua, pois lá não há vento para apagá-las." },

{ t: "A Criação da Internet", p: "A partir de 1969", c: "Ciência e tecnologia", e: "🌐", cor: ["#6E9BC4","#2F5474"],
  txt: "A internet começou como uma forma de ligar poucos computadores para trocar informações entre universidades e centros de pesquisa. Com o passar dos anos, foi crescendo e se espalhando pelo mundo. Nos anos noventa surgiu a web, com páginas que podiam ser acessadas por qualquer pessoa. A partir daí, a internet mudou o modo como vivemos: passamos a enviar mensagens, ver fotos, assistir a vídeos e conversar com pessoas distantes em segundos. Hoje ela está presente em quase tudo, dos telefones às televisões. É uma das invenções que mais transformaram a vida moderna em pouco tempo.",
  cur: "A primeira mensagem enviada entre computadores travou logo na primeira tentativa." },

{ t: "A Queda do Muro de Berlim", p: "1989", c: "Guerras importantes", e: "🯱", cor: ["#9A8F80","#4E463A"],
  txt: "Depois da Segunda Guerra Mundial, a cidade de Berlim, na Alemanha, foi dividida por um muro. De um lado ficava a parte ligada aos países do ocidente; do outro, a parte ligada ao bloco soviético. Famílias foram separadas, e muitas pessoas não podiam atravessar de um lado para o outro. O muro tornou-se um símbolo da divisão do mundo em duas grandes forças. Em 1989, após anos de tensão, a população finalmente derrubou o muro, em meio a muita comemoração. Sua queda marcou o fim de uma época e o começo da reunificação da Alemanha.",
  cur: "Pedaços do muro foram guardados e hoje estão espalhados em museus pelo mundo." },

{ t: "Júlio César e Roma", p: "100–44 a.C.", c: "Personalidades", e: "🏛️", cor: ["#C1A15C","#6E5322"],
  txt: "Júlio César foi um dos líderes mais famosos da Roma antiga. General talentoso, conquistou territórios importantes, como a Gália, região onde hoje fica a França. Com grande popularidade entre o povo e os soldados, tornou-se o homem mais poderoso de Roma. Ele fez mudanças no governo e até reorganizou o calendário, criando um modelo parecido com o que usamos hoje. Mas seu grande poder despertou inveja e medo entre outros políticos. César acabou sendo assassinado por um grupo de senadores. Sua história é lembrada até hoje e inspirou peças, livros e filmes.",
  cur: "O mês de julho recebeu esse nome em homenagem a Júlio César." },

{ t: "Joana d'Arc", p: "1412–1431", c: "Personalidades", e: "🛡️", cor: ["#B0A2C0","#4E4560"],
  txt: "Joana d'Arc foi uma jovem camponesa francesa que se tornou heroína de seu país. Numa época em que a França estava em guerra contra a Inglaterra, ela dizia ouvir vozes que a mandavam ajudar seu povo. Ainda adolescente, convenceu os líderes a deixá-la acompanhar o exército. Com coragem, ajudou a levantar o ânimo dos soldados e participou de vitórias importantes. Sua bravura inspirou muita gente. Infelizmente, foi capturada pelos inimigos e condenada à morte muito jovem. Anos depois, foi reconhecida como heroína e, séculos mais tarde, tornou-se santa. Até hoje é lembrada como símbolo de coragem.",
  cur: "Ela tinha apenas dezessete anos quando começou a acompanhar o exército francês." },

{ t: "A Escrita na Mesopotâmia", p: "Cerca de 3500 a.C.", c: "Antiguidade", e: "📜", cor: ["#C7A86B","#6E5527"],
  txt: "Muito antes dos livros e dos computadores, os povos da Mesopotâmia, entre os rios Tigre e Eufrates, criaram uma das primeiras formas de escrita do mundo. Eles usavam pequenas hastes para fazer marcas em placas de argila mole, que depois endureciam. Essa escrita servia para registrar contas, quantidades de grãos, leis e histórias. Antes disso, tudo precisava ser guardado apenas na memória. Com a escrita, o conhecimento pôde ser guardado e passado de geração em geração. Foi um dos maiores avanços da humanidade, pois marca o começo da história escrita, aquela que podemos ler nos registros deixados pelos antigos.",
  cur: "Essa escrita antiga é chamada de cuneiforme, por causa das marcas em forma de cunha." },

{ t: "A Invenção da Roda", p: "Cerca de 3500 a.C.", c: "Grandes invenções", e: "🛤️", cor: ["#A38A6B","#5A4A32"],
  txt: "A roda é uma das invenções mais simples e, ao mesmo tempo, mais importantes da história. Antes dela, tudo o que era pesado precisava ser arrastado ou carregado. Com a roda, ficou muito mais fácil transportar cargas e pessoas. Ela começou a ser usada há milhares de anos, primeiro para trabalhos com barro e depois em carros puxados por animais. Com o tempo, a roda apareceu em carroças, moinhos e máquinas de todo tipo. Até hoje ela está presente em quase tudo o que se move, como carros, bicicletas e trens. Uma ideia simples que mudou o mundo para sempre.",
  cur: "A roda foi inventada depois da agricultura, e não antes, como muita gente imagina." },

{ t: "Os Faraós e Tutancâmon", p: "Cerca de 1330 a.C.", c: "Impérios", e: "👑", cor: ["#D6B25E","#7C5E1E"],
  txt: "Tutancâmon foi um faraó do Egito que se tornou rei ainda criança e morreu muito jovem. Por muitos séculos, seu nome ficou esquecido. Mas, no início do século XX, arqueólogos encontraram seu túmulo quase intacto, cheio de tesouros de ouro, joias e objetos preciosos. A descoberta encantou o mundo inteiro. A famosa máscara de ouro que cobria seu rosto tornou-se um dos símbolos mais conhecidos do Egito antigo. Graças a esse achado, aprendemos muito sobre como viviam os faraós, no que acreditavam e como se preparavam para a vida após a morte.",
  cur: "O túmulo de Tutancâmon foi encontrado quase intacto, algo muito raro no Egito." },

{ t: "Gengis Khan e o Império Mongol", p: "1162–1227", c: "Impérios", e: "🐎", cor: ["#A88C5A","#5A4726"],
  txt: "Gengis Khan foi um líder que uniu os povos nômades da Mongólia e criou um dos maiores impérios que já existiram. Montado a cavalo, seu exército era rápido, disciplinado e temido. Em poucos anos, o Império Mongol se estendeu por uma imensa parte da Ásia, chegando até a Europa. Apesar da fama de guerreiro, Gengis Khan também organizou leis, incentivou o comércio e permitiu que pessoas de diferentes religiões vivessem sob seu domínio. As estradas do império ligaram o Oriente ao Ocidente, facilitando a troca de produtos e ideias entre povos muito distantes.",
  cur: "O Império Mongol chegou a ser o maior império contínuo de terras da história." },

{ t: "As Cruzadas", p: "Séculos XI a XIII", c: "Idade Média", e: "✝️", cor: ["#B08A70","#5E4432"],
  txt: "As Cruzadas foram grandes expedições militares organizadas na Idade Média. Cavaleiros e soldados da Europa partiam em longas viagens rumo à Terra Santa, região onde fica Jerusalém, considerada sagrada por diferentes religiões. Essas viagens duravam meses e enfrentavam muitas dificuldades. Além dos conflitos, as Cruzadas tiveram outro efeito importante: o contato entre europeus e povos do Oriente. Desse encontro vieram novos produtos, temperos, tecidos e conhecimentos que antes não existiam na Europa. Assim, mesmo em meio a guerras, houve troca de culturas que ajudou a transformar o mundo medieval e abriu caminho para novas ideias.",
  cur: "Foi por meio desses contatos que muitas especiarias se tornaram conhecidas na Europa." },

{ t: "A Peste Negra", p: "Século XIV", c: "Idade Média", e: "🌿", cor: ["#8A8272","#45403A"],
  txt: "No século XIV, uma terrível doença se espalhou pela Europa: a Peste Negra. Ela era transmitida principalmente por pulgas que viviam em ratos, mas na época ninguém sabia disso. A doença se alastrou muito rapidamente, passando de cidade em cidade pelas rotas de comércio. Em poucos anos, uma grande parte da população europeia perdeu a vida. Foi um dos períodos mais tristes da história. A falta de conhecimento sobre higiene e medicina tornava tudo pior. Com o tempo, a humanidade aprendeu muito com essa tragédia, o que ajudou no desenvolvimento da medicina e dos cuidados com a saúde.",
  cur: "Na época, acreditava-se que a doença vinha do ar ruim, e não dos ratos." },

{ t: "O Renascimento", p: "Séculos XV e XVI", c: "Renascimento", e: "🖼️", cor: ["#C2A36B","#6E5330"],
  txt: "O Renascimento foi um período de grande florescimento das artes, das ciências e do pensamento, que começou na Itália e se espalhou pela Europa. Depois de séculos, as pessoas voltaram a se interessar pelas ideias da Grécia e da Roma antigas. Artistas criaram pinturas e esculturas belíssimas, mais realistas e cheias de detalhes. Cientistas passaram a observar a natureza com mais atenção e curiosidade. Foi a época de gênios como Leonardo da Vinci e Michelangelo. O ser humano voltou ao centro das atenções, e muitas ideias novas surgiram. O Renascimento ajudou a construir a ponte entre o mundo medieval e o mundo moderno.",
  cur: "A palavra renascimento significa nascer de novo, referindo-se ao saber antigo." },

{ t: "Michelangelo e a Capela Sistina", p: "1508–1512", c: "Renascimento", e: "🎨", cor: ["#BFA06A","#6B5028"],
  txt: "Michelangelo foi um dos maiores artistas do Renascimento. Escultor, pintor e arquiteto, ficou famoso por obras impressionantes. Uma das mais admiradas é o teto da Capela Sistina, no Vaticano. Durante cerca de quatro anos, ele pintou o enorme teto deitado em andaimes, bem no alto, criando dezenas de figuras cheias de vida e movimento. O resultado é uma das obras de arte mais famosas do mundo, visitada por milhões de pessoas. Michelangelo também esculpiu a estátua de Davi, feita em mármore, considerada perfeita em seus detalhes. Seu talento inspira artistas até os dias de hoje.",
  cur: "Ele se considerava, acima de tudo, um escultor, mesmo sendo um pintor genial." },

{ t: "Vasco da Gama chega à Índia", p: "1498", c: "Grandes descobertas", e: "🧭", cor: ["#6FA0A8","#2F5A62"],
  txt: "O navegador português Vasco da Gama realizou uma das viagens mais importantes da história das navegações. Saindo de Portugal, ele contornou todo o continente africano e chegou à Índia, abrindo um caminho pelo mar entre a Europa e o Oriente. Até então, os produtos vindos da Ásia, como especiarias, seda e pedras preciosas, chegavam por rotas terrestres longas e caras. Com o novo caminho marítimo, o comércio ficou mais direto e Portugal tornou-se muito rico e poderoso. A viagem foi longa e perigosa, cheia de tempestades e doenças, mas mudou para sempre o comércio mundial.",
  cur: "As especiarias eram tão valiosas que chegavam a valer quase como ouro na Europa." },

{ t: "A Bússola", p: "Invenção antiga", c: "Grandes invenções", e: "🧭", cor: ["#7C93A8","#3A4C5E"],
  txt: "A bússola foi uma invenção que mudou a história das viagens. Ela usa uma pequena agulha magnética que sempre aponta para o norte. Antes dela, os navegantes se guiavam apenas pelo sol e pelas estrelas, o que era difícil em dias nublados ou em mar aberto. Com a bússola, os marinheiros passaram a saber a direção certa mesmo sem enxergar a terra. Ela foi criada há muitos séculos na China e depois chegou à Europa. Graças a esse pequeno instrumento, foi possível realizar grandes viagens pelos oceanos e descobrir novos continentes. Um objeto simples que abriu os caminhos do mundo.",
  cur: "A agulha da bússola aponta para o norte porque a Terra funciona como um grande ímã." },

{ t: "Nicolau Copérnico e o Sol no centro", p: "1473–1543", c: "Ciência e tecnologia", e: "☀️", cor: ["#C9A65A","#6E5322"],
  txt: "Durante muito tempo, as pessoas acreditavam que a Terra estava parada no centro do universo e que o Sol girava ao seu redor. O astrônomo Nicolau Copérnico, no entanto, teve uma ideia revolucionária: era a Terra que girava em torno do Sol, junto com os outros planetas. Essa ideia contrariava tudo o que se pensava na época e demorou a ser aceita. Mais tarde, outros cientistas confirmaram que ele estava certo. A descoberta de Copérnico mudou completamente a forma como entendemos o céu e o nosso lugar no universo. Foi o começo da astronomia moderna.",
  cur: "Ele publicou sua grande obra apenas no fim da vida, temendo a reação das pessoas." },

{ t: "Galileu Galilei e o Telescópio", p: "1564–1642", c: "Ciência e tecnologia", e: "🔭", cor: ["#8A93A8","#40495E"],
  txt: "Galileu Galilei foi um cientista italiano curioso e observador. Ele aperfeiçoou o telescópio e o apontou para o céu, sendo um dos primeiros a fazer isso. Com ele, descobriu montanhas na Lua, manchas no Sol e quatro luas girando ao redor de Júpiter. Suas observações confirmaram que a Terra não era o centro de tudo, o que causou muita polêmica em sua época. Galileu também estudou o movimento dos corpos e ajudou a criar o método científico, baseado em observar e testar. É lembrado como um dos fundadores da ciência moderna e um grande defensor da observação da natureza.",
  cur: "As quatro maiores luas de Júpiter são chamadas até hoje de luas galileanas." },

{ t: "Isaac Newton e a Gravidade", p: "1643–1727", c: "Ciência e tecnologia", e: "🍎", cor: ["#7FA070","#3A5A2E"],
  txt: "Isaac Newton foi um dos maiores cientistas de todos os tempos. Ele explicou por que os objetos caem no chão e por que os planetas giram ao redor do Sol. Tudo isso por causa de uma força invisível chamada gravidade. Conta-se que ele teve essa ideia ao ver uma maçã cair de uma árvore. Newton criou leis que descrevem o movimento das coisas, usadas até hoje em engenharia, aviação e via-gens espaciais. Também estudou a luz e as cores. Seu trabalho ajudou a humanidade a entender melhor como o mundo funciona e abriu caminho para inúmeras descobertas.",
  cur: "A famosa história da maçã caindo virou símbolo do nascimento de uma grande ideia." },

{ t: "A Máquina a Vapor", p: "Século XVIII", c: "Grandes invenções", e: "🚂", cor: ["#8C8378","#464038"],
  txt: "A máquina a vapor foi uma das invenções que deram início ao mundo moderno. Ela usava o calor da água fervendo para gerar vapor e mover peças, produzindo força suficiente para trabalhar por muitas pessoas juntas. Com essa máquina, as fábricas puderam produzir muito mais e mais rápido. Ela também foi usada em trens e navios, encurtando distâncias que antes levavam semanas para serem percorridas. Graças ao vapor, pessoas e mercadorias passaram a viajar como nunca antes. Foi o motor da Revolução Industrial e mudou para sempre o trabalho, o transporte e a vida nas cidades.",
  cur: "Os primeiros trens a vapor assustavam as pessoas, que achavam a velocidade perigosa." },

{ t: "A Lâmpada Elétrica", p: "1879", c: "Grandes invenções", e: "💡", cor: ["#D9BE6A","#7C6522"],
  txt: "Antes da lâmpada elétrica, as casas e as ruas eram iluminadas por velas, lampiões e lamparinas, que davam pouca luz e podiam causar incêndios. O inventor Thomas Edison trabalhou muito até conseguir criar uma lâmpada que durasse bastante tempo e fosse segura para uso diário. Com a luz elétrica, as pessoas passaram a poder trabalhar, ler e conviver mesmo depois de anoitecer, com muito mais conforto. As cidades ganharam iluminação nas ruas, tornando as noites mais seguras. Essa invenção mudou completamente o dia a dia da humanidade e abriu caminho para o uso da eletricidade em tudo o que conhecemos hoje.",
  cur: "Edison testou centenas de materiais antes de achar um que funcionasse bem no filamento." },

{ t: "O Telefone", p: "1876", c: "Grandes invenções", e: "☎️", cor: ["#7C93A0","#3A4A54"],
  txt: "O telefone foi uma invenção que aproximou as pessoas como nunca antes. Criado por Alexander Graham Bell, permitiu que vozes viajassem por fios elétricos e fossem ouvidas a grandes distâncias. Antes disso, para se comunicar com alguém longe, era preciso enviar cartas que demoravam dias ou até semanas. Com o telefone, tornou-se possível conversar em tempo real, mesmo estando em cidades diferentes. Aos poucos, os telefones entraram nas casas, nas empresas e mudaram a forma de viver e trabalhar. Foi o começo de uma longa história de invenções de comunicação que levaria, muito tempo depois, aos celulares modernos.",
  cur: "A primeira frase dita ao telefone foi um pedido de Bell para seu assistente ir até ele." },

{ t: "Os Irmãos Wright e o Avião", p: "1903", c: "Ciência e tecnologia", e: "🛩️", cor: ["#8FA6B8","#3E5566"],
  txt: "Os irmãos Wilbur e Orville Wright eram apaixonados por máquinas e sonhavam em voar. Após muitos testes, construíram um avião com motor e, em 1903, nos Estados Unidos, conseguiram fazer voos curtos, mas históricos. Foi um dos primeiros voos controlados de uma máquina mais pesada que o ar. Eles estudaram muito o formato das asas e a forma de controlar a direção, algo essencial para voar com segurança. O trabalho dos irmãos Wright, ao lado de outros pioneiros como Santos Dumont, marcou o começo da era da aviação, que anos depois permitiria viagens rápidas entre países e continentes.",
  cur: "O primeiro voo deles durou apenas alguns segundos e cobriu uma distância bem curta." },

{ t: "O Automóvel", p: "Fim do século XIX", c: "Grandes invenções", e: "🚗", cor: ["#8C8C94","#42424A"],
  txt: "O automóvel mudou completamente a forma como as pessoas se locomovem. Antes dele, as viagens eram feitas a pé, a cavalo ou em carruagens. Os primeiros carros movidos a motor surgiram no fim do século XIX e eram caros e raros. Mais tarde, com a produção em grande quantidade nas fábricas, os carros ficaram mais baratos e ao alcance de muitas famílias. As cidades começaram a mudar, com ruas maiores e estradas ligando lugares distantes. O automóvel trouxe liberdade e rapidez, mas também exigiu novas regras de trânsito. Até hoje ele está presente no dia a dia de milhões de pessoas em todo o mundo.",
  cur: "Henry Ford ficou famoso por criar uma linha de montagem que barateou os carros." },

{ t: "O Rádio", p: "Início do século XX", c: "Grandes invenções", e: "📻", cor: ["#A89A78","#544B34"],
  txt: "O rádio foi um dos meios de comunicação mais importantes do século XX. Por meio de ondas invisíveis, ele levava vozes, músicas e notícias para dentro das casas, sem precisar de fios. Famílias inteiras se reuniam ao redor do aparelho para ouvir programas, novelas e informações sobre o mundo. Em tempos de guerra, o rádio foi essencial para transmitir mensagens e manter as pessoas informadas. Ele aproximou lugares distantes e ajudou a espalhar cultura e entretenimento. Mesmo depois do surgimento da televisão e da internet, o rádio continua vivo e presente, acompanhando muita gente no dia a dia.",
  cur: "Por muito tempo, ouvir novela no rádio foi o principal entretenimento das famílias." },

{ t: "A Televisão", p: "Século XX", c: "Grandes invenções", e: "📺", cor: ["#8A94A0","#40474F"],
  txt: "A televisão foi uma invenção que transformou o entretenimento e a informação. Diferente do rádio, ela permitia não apenas ouvir, mas também ver imagens em movimento dentro de casa. Aos poucos, tornou-se presente na maioria dos lares e mudou os hábitos das famílias, que passavam noites assistindo a programas, jornais, novelas e jogos. A televisão aproximou o mundo, mostrando acontecimentos de países distantes quase na hora em que aconteciam. Momentos históricos, como a chegada do homem à Lua, foram vistos por milhões de pessoas pela tela. Foi um dos grandes símbolos do século XX.",
  cur: "As primeiras televisões mostravam imagens apenas em preto e branco." },

{ t: "A Vacina", p: "A partir de 1796", c: "Ciência e tecnologia", e: "💉", cor: ["#7FB0A0","#356B5A"],
  txt: "As vacinas estão entre as maiores conquistas da medicina. A ideia surgiu quando o médico Edward Jenner percebeu que era possível proteger as pessoas de uma doença grave chamada varíola. A vacina ensina o corpo a se defender de uma doença antes mesmo de pegá-la de verdade. Com o passar do tempo, foram criadas vacinas contra muitas outras doenças perigosas, salvando milhões de vidas em todo o mundo. Graças às vacinas, doenças que antes matavam muita gente hoje quase desapareceram. É um exemplo poderoso de como a ciência protege a saúde e o bem-estar de toda a humanidade.",
  cur: "A palavra vacina vem do latim para vaca, por causa das primeiras experiências de Jenner." },

{ t: "Marie Curie e a Ciência", p: "1867–1934", c: "Personalidades", e: "⚛️", cor: ["#9A8AB0","#484056"],
  txt: "Marie Curie foi uma cientista brilhante, nascida na Polônia, que fez descobertas importantíssimas sobre a radioatividade. Numa época em que poucas mulheres podiam estudar ciência, ela venceu preconceitos e dedicou a vida à pesquisa. Descobriu novos elementos químicos e ajudou a criar técnicas usadas na medicina até hoje, como os raios usados em exames e tratamentos. Foi a primeira pessoa a receber duas vezes o Prêmio Nobel, em áreas diferentes, um feito raro. Seu trabalho abriu caminho para grandes avanços no combate a doenças. Marie Curie é lembrada como exemplo de inteligência, dedicação e coragem.",
  cur: "Ela foi a primeira mulher a ganhar um Prêmio Nobel na história." },

{ t: "Gandhi e a Paz", p: "1869–1948", c: "Personalidades", e: "🕊️", cor: ["#B0A57A","#544E34"],
  txt: "Mahatma Gandhi foi um líder indiano conhecido no mundo todo por lutar por justiça sem usar violência. Na sua época, a Índia era governada pela Inglaterra, e Gandhi liderou o povo na busca pela independência. Sua forma de protesto era pacífica: fazia caminhadas, greves e recusava-se a obedecer a leis injustas, mas sempre sem agredir ninguém. Ele acreditava que a paz e o diálogo eram mais fortes do que as armas. Graças à sua liderança, a Índia conquistou a independência. As ideias de Gandhi inspiraram muitos outros líderes que lutaram por direitos e liberdade ao redor do mundo.",
  cur: "Seu jeito de protestar sem violência inspirou movimentos por direitos em vários países." },

{ t: "A Descoberta do Fogo", p: "Pré-História", c: "Antiguidade", e: "🔥", cor: ["#C97C42","#6E3E1C"],
  txt: "O domínio do fogo foi um dos passos mais importantes na história dos seres humanos. Há muito, muito tempo, nossos antepassados aprenderam a controlar as chamas e a mantê-las acesas. Com o fogo, puderam se aquecer nas noites frias, afastar animais perigosos e iluminar a escuridão. Além disso, começaram a cozinhar os alimentos, que ficaram mais saborosos, seguros e fáceis de digerir. O fogo também reunia as pessoas ao seu redor, favorecendo a conversa e a vida em grupo. Foi graças a essa conquista que a humanidade deu um grande salto rumo ao progresso e à sobrevivência.",
  cur: "Cozinhar os alimentos ajudou o cérebro humano a receber mais energia e se desenvolver." },

{ t: "O Primeiro Satélite: Sputnik", p: "1957", c: "Exploração espacial", e: "🛰️", cor: ["#7C8AA0","#333B4A"],
  txt: "Em 1957, a União Soviética lançou ao espaço o Sputnik, o primeiro satélite artificial da história. Era uma esfera metálica pequena, com antenas, que dava voltas ao redor da Terra emitindo sinais de rádio. Foi a primeira vez que um objeto feito pelo ser humano ficou girando no espaço. Pessoas do mundo inteiro olhavam para o céu tentando avistá-lo. Esse feito marcou o início da chamada corrida espacial, uma disputa entre grandes nações para conquistar o espaço. O Sputnik abriu caminho para os satélites modernos, que hoje ajudam nas comunicações, na previsão do tempo e na navegação por todo o planeta.",
  cur: "O barulhinho do Sputnik podia ser captado por rádios amadores em vários países." },

{ t: "Yuri Gagarin no Espaço", p: "1961", c: "Exploração espacial", e: "🚀", cor: ["#6E8AA8","#2F4A62"],
  txt: "Yuri Gagarin foi o primeiro ser humano a viajar ao espaço. Em 1961, o astronauta soviético entrou em uma nave e deu uma volta completa ao redor da Terra, algo nunca feito antes. Lá de cima, ele viu nosso planeta como uma bela esfera azul cercada pela escuridão do espaço. A viagem durou pouco mais de uma hora, mas mudou a história. Gagarin tornou-se um herói mundial e provou que era possível enviar pessoas ao espaço e trazê-las de volta com segurança. Sua coragem abriu caminho para todas as viagens espaciais que vieram depois, inclusive a chegada do homem à Lua.",
  cur: "Ao ver a Terra do espaço, Gagarin teria dito que ela era linda e azul." },

{ t: "A Estação Espacial Internacional", p: "A partir de 1998", c: "Exploração espacial", e: "🛸", cor: ["#7C8AA0","#333B4A"],
  txt: "A Estação Espacial Internacional é um grande laboratório que fica no espaço, girando ao redor da Terra. Ela foi construída com a ajuda de vários países que trabalharam juntos, mostrando que a cooperação pode levar a grandes conquistas. Lá dentro, astronautas vivem e realizam experiências científicas que não poderiam ser feitas na Terra, pois flutuam sem peso. Eles estudam o corpo humano, plantas e materiais em condições especiais. A estação dá várias voltas ao redor do planeta por dia e pode, às vezes, ser vista do chão como um ponto brilhante cruzando o céu à noite.",
  cur: "Os astronautas na estação veem o Sol nascer e se pôr cerca de dezesseis vezes por dia." },

{ t: "A Descoberta do DNA", p: "1953", c: "Ciência e tecnologia", e: "🧬", cor: ["#7FA0B0","#345662"],
  txt: "O DNA é uma espécie de manual que existe dentro de cada ser vivo e guarda as instruções que nos formam. Em 1953, cientistas descobriram o formato do DNA, que lembra uma escada torcida, chamada dupla hélice. Essa descoberta ajudou a explicar por que os filhos se parecem com os pais e como as características passam de geração em geração. A partir daí, a ciência avançou muito na medicina e na biologia. Hoje o estudo do DNA ajuda a descobrir doenças, criar remédios e até identificar pessoas. Foi uma das descobertas mais importantes para entender a vida.",
  cur: "Se esticado, o DNA de uma única pessoa alcançaria distâncias enormes." },

{ t: "O Computador Pessoal", p: "Décadas de 1970 e 1980", c: "Ciência e tecnologia", e: "🖥️", cor: ["#8A94A0","#40474F"],
  txt: "Durante muito tempo, os computadores eram máquinas enormes, que ocupavam salas inteiras e só existiam em grandes empresas e universidades. Com o avanço da tecnologia, eles foram ficando menores e mais baratos, até caberem em cima de uma mesa. Assim nasceu o computador pessoal, que qualquer família podia ter em casa. Com ele, tornou-se possível escrever textos, fazer contas, jogar e, mais tarde, acessar a internet. O computador pessoal mudou a forma de trabalhar, estudar e se divertir. Foi o começo de uma revolução tecnológica que levaria, anos depois, aos notebooks, tablets e celulares que usamos hoje.",
  cur: "Alguns dos primeiros computadores pessoais foram montados dentro de garagens." },

{ t: "O Telefone Celular", p: "A partir de 1973", c: "Ciência e tecnologia", e: "📱", cor: ["#7C93A0","#3A4A54"],
  txt: "O telefone celular é uma das invenções que mais mudaram o dia a dia das pessoas. O primeiro aparelho, criado nos anos setenta, era grande e pesado como um tijolo, e a bateria durava pouco. Com o tempo, os celulares ficaram menores, mais leves e cheios de funções. Hoje, além de ligar, eles servem para enviar mensagens, tirar fotos, ouvir música, ver notícias e conversar por vídeo com pessoas do outro lado do mundo. O celular aproximou famílias e amigos que estão longe. Em poucas décadas, passou de raro e caro a estar presente no bolso de quase todo mundo.",
  cur: "A primeira ligação de celular foi feita na rua, para surpresa de quem passava." },

{ t: "A Descoberta da América pelos Povos Originários", p: "Milhares de anos atrás", c: "Antiguidade", e: "🏹", cor: ["#B08A5A","#5E4626"],
  txt: "Muito antes da chegada dos europeus, o continente americano já era habitado por diversos povos. Eles chegaram à América há milhares de anos e, ao longo do tempo, formaram grandes civilizações. Aprenderam a plantar milho, batata e outros alimentos, construíram cidades e desenvolveram conhecimentos sobre o céu e a natureza. Havia povos nas florestas, nas montanhas e nos campos, cada um com sua língua e seus costumes. Essas culturas ricas e variadas fazem parte da história da humanidade e deixaram heranças importantes, muitas das quais ainda estão presentes na alimentação, nas palavras e nas tradições de hoje.",
  cur: "Muitos alimentos que comemos hoje, como a batata e o milho, vieram desses povos." },

{ t: "Os Maias e seu Calendário", p: "Cerca de 2000 a.C. em diante", c: "Impérios", e: "📅", cor: ["#7FA070","#3A5A2E"],
  txt: "Os maias formaram uma civilização avançada na região onde hoje ficam o México e a América Central. Eles construíram cidades com grandes pirâmides e templos de pedra. Eram excelentes observadores do céu e criaram um calendário muito preciso, capaz de prever eclipses e marcar as estações do ano. Também desenvolveram uma forma de escrita e conheciam bem a matemática, usando até o conceito de zero, algo raro na antiguidade. Os maias plantavam milho e viviam em sociedades organizadas. Suas ruínas, escondidas em florestas, ainda hoje impressionam quem as visita e revelam a sabedoria desse povo antigo.",
  cur: "Os maias sabiam calcular o tempo com uma precisão impressionante para a época." },

{ t: "Os Astecas e Tenochtitlán", p: "Séculos XIV a XVI", c: "Impérios", e: "🌽", cor: ["#B0894F","#5E4522"],
  txt: "Os astecas formaram um poderoso império na região onde hoje fica o México. Sua capital, Tenochtitlán, foi construída no meio de um lago e impressionava por seu tamanho e organização, com canais, pontes e grandes templos. Era uma das maiores cidades do mundo na época. Os astecas eram bons agricultores, comerciantes e guerreiros. Tinham calendários, escrita por meio de desenhos e conhecimentos avançados de astronomia. Sua civilização floresceu até a chegada dos europeus, que trouxeram guerras e doenças. Ainda assim, muito da cultura asteca sobreviveu e faz parte da identidade do México até hoje.",
  cur: "A cidade de Tenochtitlán foi construída sobre um lago, com ilhas artificiais para plantar." },

{ t: "O Império Inca", p: "Séculos XV e XVI", c: "Impérios", e: "🏔️", cor: ["#A88C5A","#54432A"],
  txt: "O Império Inca se espalhou pela região dos Andes, na América do Sul, incluindo terras onde hoje ficam o Peru e países vizinhos. Os incas eram mestres em construção: ergueram cidades de pedra no alto das montanhas, como a famosa Machu Picchu, e criaram estradas que ligavam todo o império. Mesmo sem usar a roda ou a escrita como conhecemos, organizavam a sociedade com grande eficiência, guardando informações em cordões com nós. Plantavam em terraços nas encostas e sabiam armazenar alimentos. O império era rico e bem organizado, até ser conquistado pelos espanhóis no século XVI.",
  cur: "Machu Picchu ficou escondida nas montanhas e só se tornou mundialmente conhecida em 1911." },

{ t: "A Descoberta do Ouro no Brasil", p: "Século XVIII", c: "História do Brasil", e: "🥇", cor: ["#C9A24B","#6E5320"],
  txt: "No século XVIII, foram encontradas grandes quantidades de ouro na região onde hoje fica Minas Gerais. A notícia atraiu milhares de pessoas em busca de riqueza, vindas de várias partes do Brasil e de Portugal. Surgiram cidades inteiras ao redor das minas, muitas delas cheias de igrejas bonitas e ruas de pedra que existem até hoje. O ouro trouxe muita riqueza, mas também impostos pesados cobrados por Portugal, o que gerou revoltas. Esse período, chamado de ciclo do ouro, mudou a economia e ajudou a ocupar o interior do país, deixando marcas profundas na história brasileira.",
  cur: "Cidades históricas como Ouro Preto nasceram nessa época de busca pelo ouro." },

{ t: "A Inconfidência Mineira", p: "1789", c: "História do Brasil", e: "⚖️", cor: ["#A88C5A","#544326"],
  txt: "A Inconfidência Mineira foi um movimento que sonhava com a independência do Brasil, ainda no século XVIII. Um grupo de pessoas de Minas Gerais estava insatisfeito com os altos impostos cobrados por Portugal, especialmente sobre o ouro. Eles queriam que o Brasil se tornasse livre e governasse a si mesmo. O plano, no entanto, foi descoberto antes de acontecer. Um dos participantes mais conhecidos foi Tiradentes, que assumiu a culpa e acabou condenado à morte, tornando-se um símbolo da luta pela liberdade. Mesmo sem sucesso na época, o movimento inspirou o desejo de independência que se realizaria anos depois.",
  cur: "Tiradentes tornou-se herói nacional, e a data de sua morte é feriado no Brasil." },

{ t: "A Chegada da Família Real ao Brasil", p: "1808", c: "História do Brasil", e: "👑", cor: ["#B79256","#6B4E22"],
  txt: "Em 1808, algo inédito aconteceu: a família real portuguesa mudou-se para o Brasil. Fugindo das guerras que aconteciam na Europa, o rei e sua corte atravessaram o oceano e se instalaram no Rio de Janeiro. Com isso, o Brasil deixou de ser apenas uma colônia distante e passou a ser o centro do reino. Foram criadas escolas, bibliotecas, bancos e até um jardim botânico. Os portos, antes fechados, foram abertos ao comércio com outros países. Essa mudança trouxe grande desenvolvimento e preparou o caminho para que, poucos anos depois, o Brasil conquistasse sua independência.",
  cur: "Foi a única vez na história em que uma corte europeia governou a partir da América." },

{ t: "A Proclamação da República", p: "1889", c: "História do Brasil", e: "🏳️", cor: ["#63A36B","#2E6B3A"],
  txt: "Durante muitos anos, o Brasil foi governado por imperadores. Mas, com o tempo, cresceu o desejo de mudar a forma de governo. Em 15 de novembro de 1889, um grupo liderado por militares proclamou a República, encerrando o período do Império. O imperador Dom Pedro Segundo deixou o poder e viajou para a Europa. A partir daí, o Brasil passou a ser uma república, na qual o chefe de governo é escolhido e não herda o cargo de família. Foi uma grande mudança política. Essa data é lembrada até hoje e explica por que o Brasil passou a ter presidentes.",
  cur: "A bandeira do Brasil, com o lema Ordem e Progresso, surgiu logo após a República." },

{ t: "A Bússola do Saber: a Biblioteca de Alexandria", p: "Século III a.C.", c: "Antiguidade", e: "📖", cor: ["#C7A86B","#6E5527"],
  txt: "Na antiga cidade de Alexandria, no Egito, existiu uma das maiores bibliotecas do mundo antigo. Ela reunia milhares de rolos de textos com conhecimentos de várias regiões, sobre matemática, medicina, astronomia, história e muito mais. Sábios de diferentes lugares viajavam até lá para estudar e trocar ideias. Era como um grande centro de pesquisa da antiguidade. Infelizmente, com o passar do tempo e por causa de incêndios e guerras, a biblioteca foi destruída, e muito conhecimento se perdeu para sempre. Ainda assim, ela é lembrada como símbolo da importância de guardar e compartilhar o saber.",
  cur: "Dizem que os navios que chegavam ao porto tinham seus livros copiados para a biblioteca." },

{ t: "Confúcio e a Sabedoria da China", p: "551–479 a.C.", c: "Personalidades", e: "☯️", cor: ["#A8946B","#544A2E"],
  txt: "Confúcio foi um dos pensadores mais importantes da China antiga. Ele viveu há mais de dois mil e quinhentos anos e dedicou a vida a ensinar como as pessoas deveriam se comportar para viver bem em sociedade. Pregava o respeito aos mais velhos, a honestidade, a educação e a bondade. Seus ensinamentos foram reunidos por seus alunos e passaram a orientar famílias, governantes e o povo por muitos séculos. As ideias de Confúcio influenciaram profundamente a cultura chinesa e de outros países da Ásia. Até hoje suas frases sobre sabedoria e boa convivência são lembradas e repetidas em todo o mundo.",
  cur: "Muitos provérbios de sabedoria populares são atribuídos a Confúcio." },

{ t: "A Descoberta da Eletricidade", p: "Séculos XVIII e XIX", c: "Ciência e tecnologia", e: "⚡", cor: ["#D9BE6A","#7C6522"],
  txt: "A eletricidade sempre existiu na natureza, como nos raios das tempestades, mas demorou muito até que os seres humanos aprendessem a controlá-la. Cientistas curiosos fizeram muitas experiências para entender essa força invisível. Um deles, Benjamin Franklin, estudou os raios usando pipas em dias de tempestade. Com o tempo, outros pesquisadores descobriram como produzir e transportar energia elétrica. Isso permitiu iluminar cidades, mover máquinas e, mais tarde, fazer funcionar rádios, televisões e computadores. Hoje a eletricidade está em quase tudo o que usamos. Foi uma das conquistas que mais transformaram a vida moderna, trazendo conforto e progresso para o mundo inteiro.",
  cur: "Benjamin Franklin ajudou a provar que os raios são feitos de eletricidade." },

{ t: "O Nascimento da Fotografia", p: "Século XIX", c: "Grandes invenções", e: "📷", cor: ["#8C8378","#464038"],
  txt: "Antes da fotografia, a única forma de guardar a imagem de uma pessoa ou de um lugar era por meio de pinturas e desenhos, feitos à mão. No século XIX, inventores descobriram como registrar imagens usando luz e materiais especiais, criando as primeiras fotografias. No começo, era preciso ficar parado por vários minutos para que a imagem aparecesse. Com o tempo, as câmeras foram melhorando e ficaram mais rápidas e fáceis de usar. A fotografia permitiu guardar lembranças de família, registrar acontecimentos importantes e mostrar lugares distantes. Foi uma invenção que mudou a forma como enxergamos e recordamos o mundo ao nosso redor.",
  cur: "Nas primeiras fotos, era preciso ficar parado tanto tempo que quase ninguém sorria." },

{ t: "A Descoberta dos Raios X", p: "1895", c: "Ciência e tecnologia", e: "🦴", cor: ["#8A93A8","#40495E"],
  txt: "Os raios X foram descobertos por acaso pelo cientista Wilhelm Röntgen, enquanto fazia experiências em seu laboratório. Ele percebeu que um tipo especial de raio conseguia atravessar objetos e mostrar o que havia dentro. Ao testar em uma mão, viu pela primeira vez os ossos de uma pessoa viva, sem precisar de cortes. Foi uma descoberta impressionante e muito útil para a medicina. Com os raios X, os médicos passaram a enxergar fraturas, problemas nos pulmões e outras doenças escondidas dentro do corpo. Essa invenção salvou e continua salvando muitas vidas, sendo usada em hospitais do mundo inteiro.",
  cur: "A primeira imagem de raio X mostrou a mão da esposa do cientista, com um anel no dedo." },

{ t: "A Torre Eiffel", p: "1889", c: "Grandes invenções", e: "🗼", cor: ["#9A9488","#4C4840"],
  txt: "A Torre Eiffel foi construída em Paris, na França, para uma grande exposição mundial. Feita de ferro, com mais de trezentos metros de altura, foi por muitos anos a construção mais alta do mundo. No começo, muitas pessoas não gostaram dela e a acharam feia demais para a cidade. Com o tempo, porém, a torre conquistou o coração de todos e tornou-se o símbolo de Paris e da França. Hoje é um dos pontos mais visitados do mundo, recebendo milhões de turistas todos os anos. À noite, ela se ilumina e oferece um espetáculo encantador para quem a observa.",
  cur: "A torre deveria ser temporária e quase foi desmontada anos após ser construída." },

{ t: "A Estatua da Liberdade", p: "1886", c: "Grandes invenções", e: "🗽", cor: ["#7FA69A","#356B5A"],
  txt: "A Estátua da Liberdade é um dos monumentos mais conhecidos do mundo. Ela foi um presente da França aos Estados Unidos, como símbolo de amizade e de liberdade. A estátua mostra uma mulher segurando uma tocha erguida, representando a luz que guia rumo à liberdade. Foi transportada em pedaços por navio, atravessando o oceano, e depois montada em uma ilha na entrada da cidade de Nova York. Durante muitos anos, ela foi a primeira coisa que os imigrantes viam ao chegar de barco em busca de uma vida melhor. Por isso, tornou-se um símbolo de esperança e de novos começos.",
  cur: "A tocha e a coroa da estátua podem ser visitadas por dentro, bem no alto." },

{ t: "A Grande Navegação dos Vikings", p: "Séculos VIII a XI", c: "Idade Média", e: "🚣", cor: ["#7C8A94","#3A464E"],
  txt: "Os vikings foram povos guerreiros e navegadores que viviam no norte da Europa, na região onde hoje ficam países como Noruega, Suécia e Dinamarca. Em seus barcos longos e resistentes, cruzavam mares perigosos em busca de novas terras, comércio e aventuras. Chegaram a lugares distantes e, segundo se acredita, foram os primeiros europeus a pisar na América do Norte, muito antes de Colombo. Além de guerreiros, eram bons agricultores, artesãos e comerciantes. Deixaram histórias, lendas e uma cultura rica que ainda desperta grande curiosidade. Os vikings são lembrados como corajosos exploradores dos mares gelados do norte.",
  cur: "Os barcos vikings eram tão bem feitos que podiam navegar em rios e em mar aberto." },

{ t: "A Bomba Atômica e o Fim da Guerra", p: "1945", c: "Guerras importantes", e: "💥", cor: ["#8A7C6E","#463E36"],
  txt: "Durante a Segunda Guerra Mundial, os cientistas desenvolveram uma arma de poder destrutivo nunca visto: a bomba atômica. Em 1945, duas dessas bombas foram lançadas sobre cidades do Japão, causando destruição imensa e a morte de muitas pessoas. Pouco depois, a guerra chegou ao fim. Esse acontecimento chocou o mundo e mostrou o perigo que a ciência pode representar quando usada para a guerra. Desde então, países de todo o mundo passaram a discutir formas de evitar o uso dessas armas. A história da bomba atômica é lembrada como um alerta sobre a importância da paz.",
  cur: "Após a guerra, muitos cientistas passaram a defender que a energia atômica fosse usada para o bem." },

{ t: "A Descoberta do Petróleo", p: "Século XIX em diante", c: "Ciência e tecnologia", e: "🛢️", cor: ["#7C7266","#3E3830"],
  txt: "O petróleo é um líquido escuro encontrado no subsolo, formado ao longo de milhões de anos. No século XIX, as pessoas descobriram como retirá-lo da terra e transformá-lo em combustível. A partir daí, ele passou a mover automóveis, navios, aviões e fábricas. Do petróleo também se fazem plásticos, tintas e muitos outros produtos usados no dia a dia. Ele se tornou uma das riquezas mais importantes do mundo moderno, movimentando a economia de muitos países. Ao mesmo tempo, seu uso trouxe desafios para o meio ambiente, e hoje a humanidade busca formas de energia mais limpas e sustentáveis.",
  cur: "Muitos objetos do dia a dia, como plásticos e tintas, são feitos a partir do petróleo." },

{ t: "A Escrita dos Hieróglifos", p: "Egito Antigo", c: "Antiguidade", e: "🔣", cor: ["#D2A679","#7C4A2A"],
  txt: "No Egito Antigo, as pessoas escreviam usando desenhos chamados hieróglifos. Cada figura podia representar um som, uma palavra ou uma ideia. Esses símbolos eram gravados em paredes de templos, túmulos e em folhas feitas de uma planta chamada papiro. Somente algumas pessoas, chamadas escribas, aprendiam a ler e escrever, sendo muito respeitadas. Durante séculos, ninguém mais soube decifrar esses desenhos, até que uma pedra especial, encontrada muito tempo depois, ajudou os estudiosos a entender seu significado. Graças a isso, hoje conhecemos histórias, leis e crenças dos antigos egípcios, escritas há milhares de anos.",
  cur: "A Pedra de Roseta foi a chave que permitiu decifrar os hieróglifos egípcios." },

{ t: "A Bússola do Céu: os Primeiros Mapas", p: "Antiguidade em diante", c: "Grandes descobertas", e: "🗺️", cor: ["#C89B6A","#6E4A24"],
  txt: "Desde muito cedo, os seres humanos sentiram a necessidade de representar o mundo ao seu redor. Assim surgiram os primeiros mapas, desenhados para mostrar rios, montanhas, cidades e caminhos. No começo, eram simples e cheios de imprecisões, pois pouco se conhecia sobre a Terra. Com as grandes viagens de exploração, os mapas foram melhorando, incluindo novos continentes e oceanos descobertos pelos navegadores. Eles se tornaram ferramentas essenciais para o comércio, as viagens e as guerras. Cada novo mapa revelava um mundo maior e mais conhecido. Hoje, com satélites, temos mapas precisos de todo o planeta na palma da mão.",
  cur: "Mapas antigos costumavam desenhar monstros marinhos nas regiões ainda desconhecidas." },

{ t: "A Revolução dos Transportes: o Trem", p: "Século XIX", c: "Grandes invenções", e: "🚂", cor: ["#8C8378","#464038"],
  txt: "A chegada dos trens mudou completamente a forma de viajar e transportar mercadorias. Movidos a vapor, eles podiam percorrer longas distâncias muito mais rápido do que carroças e cavalos. Trilhos foram construídos ligando cidades e regiões distantes, aproximando pessoas e mercados. O trem permitiu que produtos, cartas e passageiros chegassem a lugares antes isolados. As estações ferroviárias tornaram-se pontos de encontro e símbolos de progresso. No Brasil e em muitos países, as ferrovias ajudaram a desenvolver a economia e a ocupar novas terras. O trem foi um dos grandes símbolos da era industrial e do avanço tecnológico.",
  cur: "As primeiras viagens de trem assustavam quem achava perigoso andar tão depressa." },

{ t: "A Grande Muralha do Conhecimento: as Universidades", p: "Idade Média", c: "Idade Média", e: "🎓", cor: ["#A9A29B","#5A5450"],
  txt: "Foi na Idade Média que surgiram as primeiras universidades, escolas onde jovens iam estudar assuntos avançados. Antes disso, o conhecimento ficava guardado principalmente em mosteiros, com os monges que copiavam livros à mão. Nas universidades, estudavam-se medicina, leis, filosofia e outros temas. Estudantes vinham de várias regiões para aprender com mestres respeitados. Essas escolas ajudaram a preservar e espalhar o saber, formando médicos, juristas e pensadores. Muitas universidades criadas naquela época ainda existem e continuam funcionando até hoje. Elas mostram que a busca pelo conhecimento sempre foi importante para o progresso da humanidade.",
  cur: "Algumas universidades europeias têm mais de oitocentos anos de história." },

{ t: "A Descoberta da América por Américo Vespúcio", p: "Fim do século XV", c: "Grandes descobertas", e: "🧭", cor: ["#7FA6B0","#3C5A62"],
  txt: "Américo Vespúcio foi um navegador e explorador que fez viagens às novas terras encontradas do outro lado do oceano. Diferente de Colombo, que acreditava ter chegado à Ásia, Vespúcio percebeu que aquelas terras faziam parte de um continente totalmente novo, desconhecido pelos europeus. Ele descreveu suas viagens em cartas que se espalharam pela Europa e chamaram muita atenção. Por causa dessa descoberta, o novo continente acabou recebendo o nome de América, em sua homenagem. Assim, o nome que usamos hoje para todo o continente veio desse explorador curioso, que soube reconhecer que havia encontrado um mundo novo.",
  cur: "O continente americano recebeu esse nome por causa do primeiro nome de Vespúcio." },

{ t: "A Corrida Espacial", p: "Décadas de 1950 e 1960", c: "Exploração espacial", e: "🌌", cor: ["#6E8AA8","#2F4A62"],
  txt: "Depois da Segunda Guerra Mundial, dois países muito poderosos, os Estados Unidos e a União Soviética, começaram uma disputa para ver quem conquistaria primeiro o espaço. Esse período ficou conhecido como corrida espacial. Cada nação queria mostrar força e inteligência enviando satélites, animais e depois pessoas ao espaço. Foi uma época de grandes avanços científicos e de muita emoção, que culminou com a chegada do homem à Lua. A competição impulsionou a tecnologia e trouxe invenções usadas até hoje, como satélites de comunicação. A corrida espacial mostrou até onde a ambição e a ciência humanas podem chegar.",
  cur: "Antes das pessoas, animais como cadelas e macacos foram enviados ao espaço em testes." },

{ t: "O Telescópio Espacial", p: "A partir de 1990", c: "Exploração espacial", e: "🔭", cor: ["#7C8AA0","#333B4A"],
  txt: "Para observar o universo com mais clareza, cientistas colocaram grandes telescópios no espaço, longe das nuvens e da luz das cidades. De lá de cima, eles conseguem enxergar estrelas, galáxias e planetas muito distantes, com uma nitidez impossível de obter da Terra. As imagens enviadas por esses telescópios revelaram paisagens deslumbrantes do céu e ajudaram a responder perguntas antigas sobre como o universo surgiu. Graças a eles, descobrimos que o universo é muito maior e mais antigo do que se imaginava. Esses instrumentos são como olhos gigantes que a humanidade lançou ao espaço para conhecer melhor o cosmos.",
  cur: "Alguns telescópios mostram a luz de estrelas que começou a viajar há bilhões de anos." },

{ t: "A Internet nas Mãos: os Smartphones", p: "A partir de 2007", c: "Ciência e tecnologia", e: "📲", cor: ["#7C93A0","#3A4A54"],
  txt: "Os smartphones são telefones celulares muito avançados, que funcionam quase como pequenos computadores. Com uma tela sensível ao toque, permitem acessar a internet, tirar fotos, assistir a vídeos, ouvir música e conversar com pessoas de qualquer lugar do mundo. Eles reuniram, em um único aparelho, funções que antes exigiam vários objetos diferentes. Em poucos anos, tornaram-se parte do dia a dia de bilhões de pessoas. Com eles, ficou fácil enviar mensagens, ver notícias, fazer chamadas de vídeo e até pagar contas. Os smartphones mudaram a forma como vivemos, trabalhamos e nos comunicamos, aproximando famílias e amigos distantes.",
  cur: "Um smartphone atual tem mais poder de cálculo do que os computadores que levaram o homem à Lua." },

{ t: "A Muralha de Gelo: a Exploração dos Polos", p: "Início do século XX", c: "Grandes descobertas", e: "🧊", cor: ["#8FB0C4","#3E5B6E"],
  txt: "Durante muito tempo, os polos Norte e Sul foram grandes mistérios para a humanidade. Cobertos de gelo e com temperaturas terríveis, esses lugares pareciam impossíveis de alcançar. No início do século XX, exploradores corajosos enfrentaram frio extremo, ventos fortes e a falta de comida para chegar a esses pontos distantes da Terra. Alguns perderam a vida na tentativa; outros conseguiram, tornando-se heróis de sua época. Suas viagens ajudaram a conhecer melhor o planeta e as regiões geladas. Hoje, cientistas trabalham nesses lugares estudando o clima e o gelo, que guardam informações importantes sobre a história da Terra.",
